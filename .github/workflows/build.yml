name: Build Admin Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './package-lock.json'

    - name: Install Dependencies
      run: npm install

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Setup Debug Keystore
      run: |
        echo "${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}" | base64 -d > android/debug.keystore
        echo "===== KEYSTORE FINGERPRINTS ====="
        keytool -list -v -keystore android/debug.keystore -storepass android -alias androiddebugkey | grep -E "SHA1|SHA256"
        echo "================================"

    - name: Build with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: admin-app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
